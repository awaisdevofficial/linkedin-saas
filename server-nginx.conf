# -------------------------
# HTTP server (redirect to HTTPS)
# -------------------------
server {
    listen 80;
    listen [::]:80;
    server_name linkedinflow.duckdns.org;

    return 301 https://$host$request_uri;
}

# -------------------------
# HTTPS server
# -------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name linkedinflow.duckdns.org;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/linkedinflow.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linkedinflow.duckdns.org/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Website root
    root /var/www/html;
    index index.html;

    # Frontend routing (fix for /admin or other routes)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API — pass full URI (no trailing slash on proxy_pass so /api/* stays as /api/*)
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }


    # Admin panel: serve SPA for document requests so React loads; API requests go to backend
    location = /admin {
        return 302 /admin/;
    }
    location = /admin/ {
        try_files /index.html =404;
    }
    # GET /admin/login = login page; serve SPA. POST = proxy to backend (via internal rewrite).
    location = /admin/login {
        set $admin_serve_spa 1;
        if ($request_method != GET) { set $admin_serve_spa 0; }
        if ($admin_serve_spa = 0) { rewrite ^ /_proxy_admin_login last; }
        try_files /index.html =404;
    }
    location = /_proxy_admin_login {
        internal;
        proxy_pass http://127.0.0.1:4000/admin/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
    }
    # /admin/*: serve SPA for page loads (GET without Accept: application/json), proxy API to backend
    location /admin/ {
        set $admin_proxy 0;
        if ($request_method != GET) { set $admin_proxy 1; }
        if ($http_accept ~* "application/json") { set $admin_proxy 1; }
        if ($admin_proxy = 0) { rewrite ^ /_admin_spa last; }
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
    }
    location = /_admin_spa {
        internal;
        root /var/www/html;
        try_files /index.html =404;
    }

    # Backend auth routes (POST /auth/login-email, GET /auth/linkedin, callback)
    location = /auth/linkedin {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /auth/linkedin/callback {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /auth/login-email {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
    }

    access_log /var/log/nginx/linkedinflow.access.log;
    error_log /var/log/nginx/linkedinflow.error.log;
}
