# Nginx config for linkedinflow.duckdns.org (Postora)
# Copy to /etc/nginx/sites-available/postpilot and: sudo nginx -t && sudo systemctl reload nginx
# Only proxy backend auth routes; /auth/login, /auth/signup, /auth/callback etc. are frontend SPA routes.
#
# If email login is "stuck" (request to /auth/login-email): ensure this file is active on the server,
# the location = /auth/login-email block exists, and backend .env has FRONTEND_URL=https://linkedinflow.duckdns.org

server {
    listen 80;
    server_name linkedinflow.duckdns.org;

    root /home/ubuntu/linkedin-saas/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        # KIE image/video generation can take several minutes (async polling)
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Admin panel: serve SPA for document requests so React loads; API requests go to backend
    location = /admin {
        return 302 /admin/;
    }
    location = /admin/ {
        try_files /index.html =404;
    }
    # GET /admin/login = login page; serve SPA. POST = proxy to backend (via internal rewrite).
    location = /admin/login {
        set $admin_serve_spa 1;
        if ($request_method != GET) { set $admin_serve_spa 0; }
        if ($admin_serve_spa = 0) { rewrite ^ /_proxy_admin_login last; }
        try_files /index.html =404;
    }
    location = /_proxy_admin_login {
        internal;
        proxy_pass http://127.0.0.1:4000/admin/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
    }
    # /admin/*: serve SPA for page loads (GET without Accept: application/json), proxy API to backend
    location /admin/ {
        set $admin_proxy 0;
        if ($request_method != GET) { set $admin_proxy 1; }
        if ($http_accept ~* "application/json") { set $admin_proxy 1; }
        if ($admin_proxy = 0) { rewrite ^ /_admin_spa last; }
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
    }
    location = /_admin_spa {
        internal;
        try_files /index.html =404;
    }

    # Backend OAuth and email login only (do not proxy /auth/login or /auth/callback - those are frontend routes)
    location = /auth/linkedin {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /auth/linkedin/callback {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # POST /auth/login-email — must proxy to backend (otherwise POST gets SPA or 405)
    location = /auth/login-email {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
